services:
  pubsub:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=pucora-smoke
    ports:
      - "8085:8085"

  pubsub-init:
    image: curlimages/curl:8.11.1
    depends_on:
      pubsub:
        condition: service_started
    environment:
      PUBSUB_EMULATOR_HOST: pubsub:8085
      PUBSUB_PROJECT_ID: pucora-smoke
    volumes:
      - ./scripts/init-pubsub.sh:/scripts/init-pubsub.sh:ro
    entrypoint: ["/bin/sh", "/scripts/init-pubsub.sh"]

  pucora:
    build:
      context: ../../..
      dockerfile: Dockerfile
      args:
        VERSION: "2.2.0"
    ports:
      - "8080:8080"
    environment:
      PUBSUB_EMULATOR_HOST: pubsub:8085
    volumes:
      - ./pucora.json:/etc/pucora/pucora.json:ro
    depends_on:
      pubsub-init:
        condition: service_completed_successfully
    command: ["run", "-c", "/etc/pucora/pucora.json"]
