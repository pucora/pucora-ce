{{- if and (eq .Values.config.mode "secret") (not .Values.config.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "velonetics.configSecretName" . }}
  labels:
    {{- include "velonetics.labels" . | nindent 4 }}
type: Opaque
stringData:
  velonetics.json: |
{{- .Values.config.veloneticsJson | nindent 4 }}
{{- end }}
