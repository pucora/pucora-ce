{{- if .Values.certificate.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "velonetics.fullname" . }}
  labels:
    {{- include "velonetics.labels" . | nindent 4 }}
spec:
  secretName: {{ include "velonetics.certificateSecretName" . }}
  issuerRef:
    {{- toYaml .Values.certificate.issuerRef | nindent 4 }}
  dnsNames:
    {{- if .Values.certificate.dnsNames }}
    {{- toYaml .Values.certificate.dnsNames | nindent 4 }}
    {{- else }}
    {{- range .Values.ingress.hosts }}
    - {{ .host | quote }}
    {{- end }}
    {{- end }}
  {{- if .Values.certificate.duration }}
  duration: {{ .Values.certificate.duration }}
  {{- end }}
  {{- if .Values.certificate.renewBefore }}
  renewBefore: {{ .Values.certificate.renewBefore }}
  {{- end }}
{{- end }}
