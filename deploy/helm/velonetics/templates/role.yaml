{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "velonetics.fullname" . }}
  labels:
    {{- include "velonetics.labels" . | nindent 4 }}
rules:
  {{- with .Values.rbac.rules }}
  {{- toYaml . | nindent 2 }}
  {{- else }}
  []
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "velonetics.fullname" . }}
  labels:
    {{- include "velonetics.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "velonetics.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "velonetics.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
