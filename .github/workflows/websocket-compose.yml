name: WebSocket Compose

on:
  push:
    branches: [main]
    paths:
      - 'examples/websocket/**'
      - 'forks/velonetics-websocket/**'
      - 'handler_factory.go'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [main]
    paths:
      - 'examples/websocket/**'
      - 'forks/velonetics-websocket/**'
      - 'handler_factory.go'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: WebSocket Docker Compose smoke
        run: make ws-compose-test
