name: Helm Cluster Test

on:
  push:
    branches: [main]
    paths:
      - 'deploy/helm/**'
      - 'Dockerfile'
      - 'cmd/pucora-ce/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/helm-cluster.yml'
  pull_request:
    branches: [main]
    paths:
      - 'deploy/helm/**'
      - 'Dockerfile'
      - 'cmd/pucora-ce/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/helm-cluster.yml'

jobs:
  helm-cluster:
    name: Kind install and health check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Fetch JSON schema
        run: |
          curl -fsSL -o cmd/pucora-ce/schema/schema.json \
            https://raw.githubusercontent.com/pucora/pucora-schema/v2.0.4/v2.13/pucora.json

      - name: Vendor modules for offline Docker build
        run: GOWORK=off go mod vendor

      - name: Verify chart version alignment
        run: bash deploy/helm/scripts/verify-chart-version.sh

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: pucora-helm-test

      - name: Run cluster install test
        env:
          RELEASE_NAME: pucora-ci
          CLUSTER_NAME: pucora-helm-test
          SKIP_CLUSTER_CREATE: "1"
        run: bash deploy/helm/scripts/cluster-test.sh
