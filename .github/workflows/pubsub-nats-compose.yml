name: PubSub nats Compose

on:
  push:
    branches: [main]
    paths:
      - 'examples/pubsub/nats/**'
      - 'examples/pubsub/scripts/**'
      - 'backend_factory.go'
      - 'executor.go'
      - 'cmd/pucora-ce/main.go'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
  pull_request:
    branches: [main]
    paths:
      - 'examples/pubsub/nats/**'
      - 'examples/pubsub/scripts/**'
      - 'backend_factory.go'
      - 'executor.go'
      - 'cmd/pucora-ce/main.go'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fetch JSON schema
        run: |
          curl -fsSL -o cmd/pucora-ce/schema/schema.json \
            https://raw.githubusercontent.com/pucora/pucora-schema/v2.0.4/v2.13/pucora.json

      - name: PubSub nats Docker Compose smoke
        run: make pubsub-nats-compose-test
